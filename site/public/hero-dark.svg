<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" fill="none">
  <defs>
    <radialGradient id="nebula-d" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DB8FF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#1a82d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4DB8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-d" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#80CCFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#80CCFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow halos -->
  <circle cx="130" cy="130" r="118" fill="url(#nebula-d)"/>
  <circle cx="130" cy="130" r="72"  fill="url(#core-d)"/>

  <!-- Orbital rings -->
  <circle cx="130" cy="130" r="112" stroke="#4DB8FF" stroke-width="0.7" opacity="0.3"  stroke-dasharray="6 9"/>
  <circle cx="130" cy="130" r="84"  stroke="#80CCFF" stroke-width="0.5" opacity="0.22"/>
  <circle cx="130" cy="130" r="56"  stroke="#4DB8FF" stroke-width="0.5" opacity="0.18" stroke-dasharray="3 5"/>

  <!-- Orbit markers -->
  <circle cx="18"  cy="130" r="2.8" fill="#4DB8FF" opacity="0.65" filter="url(#glow-d)"/>
  <circle cx="130" cy="18"  r="2.2" fill="#80CCFF" opacity="0.75"/>
  <circle cx="242" cy="130" r="2.0" fill="#4DB8FF" opacity="0.6"/>
  <circle cx="130" cy="242" r="1.8" fill="#80CCFF" opacity="0.55"/>

  <!-- Stars scattered -->
  <circle cx="14"  cy="42"  r="1.3" fill="#4DB8FF"  opacity="0.85"/>
  <circle cx="52"  cy="12"  r="0.9" fill="white"    opacity="0.9"/>
  <circle cx="185" cy="20"  r="1.1" fill="#4DB8FF"  opacity="0.8"/>
  <circle cx="222" cy="50"  r="0.8" fill="white"    opacity="0.75"/>
  <circle cx="246" cy="92"  r="1.0" fill="#4DB8FF"  opacity="0.7"/>
  <circle cx="248" cy="172" r="0.8" fill="white"    opacity="0.65"/>
  <circle cx="220" cy="210" r="1.2" fill="#4DB8FF"  opacity="0.8"/>
  <circle cx="178" cy="242" r="0.9" fill="white"    opacity="0.75"/>
  <circle cx="105" cy="250" r="1.0" fill="#4DB8FF"  opacity="0.7"/>
  <circle cx="44"  cy="230" r="0.8" fill="white"    opacity="0.65"/>
  <circle cx="10"  cy="196" r="1.1" fill="#4DB8FF"  opacity="0.65"/>
  <circle cx="8"   cy="160" r="0.7" fill="white"    opacity="0.55"/>
  <circle cx="240" cy="140" r="0.9" fill="#4DB8FF"  opacity="0.6"/>
  <circle cx="72"  cy="240" r="0.8" fill="white"    opacity="0.65"/>
  <circle cx="30"  cy="80"  r="0.7" fill="#4DB8FF"  opacity="0.6"/>
  <circle cx="212" cy="168" r="0.9" fill="white"    opacity="0.5"/>

  <!-- Tick marks -->
  <line x1="130" y1="16"  x2="130" y2="22"  stroke="#4DB8FF" stroke-width="1.2" opacity="0.4"/>
  <line x1="242" y1="130" x2="236" y2="130" stroke="#4DB8FF" stroke-width="1.2" opacity="0.4"/>
  <line x1="130" y1="244" x2="130" y2="238" stroke="#4DB8FF" stroke-width="1.2" opacity="0.4"/>
  <line x1="18"  y1="130" x2="24"  y2="130" stroke="#4DB8FF" stroke-width="1.2" opacity="0.4"/>

  <!-- C++ glow layer -->
  <text x="130" y="147"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-weight="900"
        font-size="70"
        fill="#4DB8FF"
        letter-spacing="-3"
        opacity="0.25"
        filter="url(#glow-d)">C++</text>

  <!-- C++ main text -->
  <text x="130" y="147"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-weight="900"
        font-size="70"
        fill="#4DB8FF"
        letter-spacing="-3">C++</text>

  <!-- CODENEBULA subtitle -->
  <text x="130" y="169"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="8.5"
        fill="#80CCFF"
        letter-spacing="5"
        opacity="0.75">CODENEBULA</text>
</svg>
